title: Suspicious Cloud Storage Bucket Policy Modification
id: 
status: draft
description: Detects modifications to cloud storage bucket policies that may indicate unauthorized access or bucket hijacking, as described in cloud hijacking attack chains.
references:
  - https://thehackernews.com/2026/07/threatsday-cloud-bucket-hijacking.html
  - https://news.google.com/publications/CAAqLQgKIidDQklTRndnTWFoTUtFWFJvWldoaFkydGxjbTVsZDNNdVkyOXRLQUFQAQ
author: 
date: 2025-04-09
logsource:
  category: cloud
  product: aws
  service: cloudtrail
detection:
  selection:
    eventSource: 's3.amazonaws.com'
    eventName:
      - 'PutBucketPolicy'
      - 'PutBucketAcl'
      - 'PutBucketPublicAccessBlock'
      - 'DeleteBucketPolicy'
      - 'DeleteBucketPublicAccessBlock'
    errorCode: ''
    userIdentity.type: 'Root'
  condition: selection
falsepositives:
  - Legitimate bucket policy changes by authorized administrators (e.g., via infrastructure automation tools like Terraform).
  - Ensure to whitelist known admin accounts, source IPs, and change management processes.
level: high
tags:
  - attack.t1530
  - attack.t1484
  - cloud.hijacking
  - aws.s3