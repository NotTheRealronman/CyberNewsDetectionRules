title: Tangem Wallet Password Reset Anomaly Detection
id: 
status: draft
description: Detects anomalous password reset events on Tangem wallet applications, potentially indicating a laser-based fault injection attack (TROPIC01) that resets the card password to default without proper authentication.
references:
  - https://thehackernews.com/2026/07/laser-attack-resets-tangem-wallet.html
  - https://donjon.ledger.com/blog/bypassing-tangem-card-security-with-laser-attack/
  - https://tangem.com/en/blog/post/lfi-response/
  - https://trezor.io/blog/news/Trezor-response-TROPIC01-chip-disclosure-no-impact-to-your-funds
  - https://www.ledger.com/blog/unfixable-key-extraction-attack-on-trezor
  - https://www.ledger.com/tangem-genuine-check-bypass-on-android-application
  - https://www.ledger.com/blog-brute-force-attack-tangem
author: 
date: 2025-04-07
logsource:
  category: application
  product: tangem
  service: wallet_authentication
detection:
  selection:
    EventID:
      - 'password_reset'
      - 'pwd_reset'
    Result: 'success'
  condition: selection | count() by src_ip, user_agent > 3 within 5m
falsepositives:
  - Legitimate password reset initiated by the user via the official Tangem app after successful authentication.
  - Testing or recovery scenarios by authorized personnel.
  - Provide additional whitelist rules for known trusted devices and IPs.
level: high
tags:
  - attack.physical
  - attack.t1200
  - attack.t1499
  - cve.2026-xxxx