title: Detect AI-Driven Rapid Credential Stuffing Attacks
id: 
status: draft
description: Detects multiple failed authentication attempts from distinct IP addresses or user agents within a short time window, indicative of automated AI-driven credential stuffing attacks as described in the referenced articles.
references:
  - https://thehacker.news/outpacing-mythos-cyberattacks
  - https://news.google.com/publications/CAAqLQgKIidDQklTRndnTWFoTUtFWFJvWldoaFkydGxjbTVsZDNNdVkyOXRLQUFQAQ
author: 
date: 2025-04-14
logsource:
  category: application
  product: generic
  service: authentication
detection:
  selection:
    event_id: 4625  # Windows failed logon
    status: failure
  timeframe: 5m
  condition: selection | count() by src_ip > 10 or count() by user > 5
falsepositives:
  - Automated password resets or account recovery processes
  - Legitimate multi-user testing or monitoring scripts
  - Consider whitelisting known internal IP ranges and service accounts
level: high
tags:
  - attack.credential_access
  - attack.t1110
  - attack.t1078
  - ai_driven_attack